services:
  postgres:
    image: postgres:16-alpine
    container_name: axiom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axiom_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-axiom_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiom_admin} -d ${POSTGRES_DB:-axiom_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axiom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  # ── Go bulk CSV ingestion (runs once at startup, then exits) ──────────────
  # Applies the PostgreSQL schema (idempotent — safe to run multiple times),
  # then uses a goroutine worker pool to bulk-load CSVs via pgx CopyFrom.
  # The Python API auto-loads into DuckDB in dev mode; this service handles
  # the PostgreSQL production path.
  go-ingestion:
    image: golang:1.23-alpine
    container_name: axiom-go-ingestion
    working_dir: /app/ingestion
    volumes:
      - ./backend-go:/app
      - ./data:/data
      - ./infra/postgres:/infra/postgres
    command: >
      sh -c "
        apk add --no-cache --quiet postgresql-client &&
        psql '${POSTGRES_DSN:-postgres://axiom_admin:dev_password@postgres:5432/axiom_db}' -f /infra/postgres/init.sql &&
        go mod tidy && go run .
      "
    env_file:
      - .env
    environment:
      DB_URL: "postgres://${POSTGRES_USER:-axiom_admin}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-axiom_db}"
      CSV_DIR: "/data/csv"
      WORKERS: "8"
      BATCH_SIZE: "1000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"   # one-shot job

  api-python:
    build:
      context: ./backend-python   # includes requirements.txt + api/
      dockerfile: api/Dockerfile
    container_name: axiom-api-python
    working_dir: /app/api
    volumes:
      - ./backend-python:/app     # hot-reload: source changes picked up by --reload
      - ./:/repo                  # data directory
    environment:
      PYTHONPATH: "/app/api"
      PYTHONWARNINGS: "ignore::FutureWarning"
      DUCKDB_PATH: "/repo/data/duckdb/analytics.duckdb"
      DATA_DIR: "/repo/data/csv"
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Go SSE gateway — in the request path between browser and Python ────────
  # Primary streaming path: browser → Next.js → Go :8080/stream → Python /internal/query
  api-go:
    image: golang:1.23-alpine
    container_name: axiom-api-go
    working_dir: /app/sse
    volumes:
      - ./backend-go:/app
    command: sh -c "go mod tidy && go run ."
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      AI_SERVICE_URL: "http://api-python:8000"
      REDIS_URL: "redis://redis:6379/0"
      PORT: "8080"
    depends_on:
      api-python:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    image: node:20-alpine
    container_name: axiom-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps --silent && npx next dev -p 3000"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      BACKEND_URL: "http://api-python:8000"
      GO_SSE_URL: "http://api-go:8080"
    depends_on:
      api-python:
        condition: service_healthy
      api-go:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
