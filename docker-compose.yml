version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: axiom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axiom_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-axiom_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiom_admin} -d ${POSTGRES_DB:-axiom_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axiom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  api-python:
    image: python:3.11-slim
    container_name: axiom-api-python
    working_dir: /app
    volumes:
      - ./backend-python:/app
    command: tail -f /dev/null 
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  api-go:
    image: golang:1.22-alpine
    container_name: axiom-api-go
    working_dir: /app
    volumes:
      - ./backend-go:/app
    command: tail -f /dev/null
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:20-alpine
    container_name: axiom-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: tail -f /dev/null
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data: