# Production Docker Compose — axiom-engine
#
# Security posture applied to every service:
#   no-new-privileges, read-only root filesystem, drop all Linux capabilities,
#   non-root user (1000:1000), tmpfs for any writable paths the process needs.
#
# Setup:
#   make secrets-init          # creates infra/secrets/*.txt with placeholders
#   # edit each file with real values
#   make prod-up               # docker compose -f docker-compose.prod.yml up -d
#   make vault-init            # load secrets into Vault
#
# The db-migrate service applies the PostgreSQL schema on every startup
# (idempotent — uses CREATE TABLE IF NOT EXISTS).

services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    user: "999:999"     # postgres image default uid
    environment:
      POSTGRES_USER_FILE:     /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pass
      POSTGRES_DB:            axiom_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /run/postgresql
    secrets:
      - db_user
      - db_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d axiom_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Schema migration (one-shot) ───────────────────────────────────────────
  # Applies infra/postgres/init.sql every run — safe because all statements
  # use IF NOT EXISTS / DROP POLICY IF EXISTS.
  db-migrate:
    image: postgres:16-alpine
    restart: "no"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    volumes:
      - ./infra/postgres/init.sql:/init.sql:ro
    secrets:
      - db_url
    command: >
      sh -c "psql $$(cat /run/secrets/db_url) -f /init.sql"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    user: "1000:1000"
    command:
      - redis-server
      - "--save"
      - ""
      - "--appendonly"
      - "no"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── HashiCorp Vault ───────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    cap_add: [IPC_LOCK]     # required by Vault to prevent secrets hitting swap
    user: "1000:1000"
    command: server -config=/vault/config/config.hcl
    volumes:
      - ./infra/vault/config.hcl:/vault/config/config.hcl:ro
      - vault_data:/vault/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Python FastAPI ────────────────────────────────────────────────────────
  api-python:
    build:
      context: ./backend-python
      dockerfile: api/Dockerfile
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    user: "1000:1000"
    environment:
      VAULT_ADDR:          http://vault:8200
      DB_BACKEND:          postgres
      LOG_FORMAT:          json
      LOG_LEVEL:           INFO
      USE_GRAPHRAG:        "false"
      LLM_PROVIDER:        ${LLM_PROVIDER:-gemini}
      GEMINI_AGENT_MODEL:  ${GEMINI_AGENT_MODEL:-gemini-2.5-flash}
      GEMINI_EVAL_MODEL:   ${GEMINI_EVAL_MODEL:-gemini-2.5-flash}
      GOOGLE_API_KEY:      ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL:     ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      PYTHONWARNINGS:      "ignore::FutureWarning"
      REPO_ROOT:           /data
      EXAMPLES_PATH:       /data/data/dspy_examples.json
      DSPY_OUTPUT_PATH:    /data/data/dspy_compiled.json
    volumes:
      - ./data:/data:ro
    tmpfs:
      - /tmp
    secrets:
      - vault_token
      - db_url
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Go bulk ingestion (one-shot) ──────────────────────────────────────────
  go-ingestion:
    build:
      context: ./backend-go/ingestion
      dockerfile: Dockerfile
    restart: "no"
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    user: "1000:1000"
    volumes:
      - ./data/csv:/data/csv:ro
    secrets:
      - db_url
    environment:
      DB_URL:     ""    # read from secret file at runtime via CMD
      CSV_DIR:    /data/csv
      WORKERS:    "8"
      BATCH_SIZE: "1000"
    command: >
      sh -c "DB_URL=$$(cat /run/secrets/db_url) /ingestion"
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # ── Go SSE Gateway ────────────────────────────────────────────────────────
  api-go:
    build:
      context: ./backend-go/sse
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    user: "1000:1000"
    environment:
      AI_SERVICE_URL: http://api-python:8000
      REDIS_URL:      redis://redis:6379/0
      RATE_LIMIT_RPM: "10"
      CB_THRESHOLD:   "3"
      CB_WINDOW_SECONDS: "30"
      CB_OPEN_SECONDS:   "60"
      PORT:           "8080"
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp
    depends_on:
      api-python:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js standalone) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    read_only: true
    cap_drop: [ALL]
    user: "1001:1001"
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api-python:8000
      GO_SSE_URL:  http://api-go:8080
      NODE_ENV:    production
    tmpfs:
      - /tmp
    depends_on:
      api-python:
        condition: service_healthy
      api-go:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

# ── Secrets ───────────────────────────────────────────────────────────────────
secrets:
  db_user:     { file: ./infra/secrets/db_user.txt }
  db_pass:     { file: ./infra/secrets/db_pass.txt }
  db_url:      { file: ./infra/secrets/db_url.txt }
  vault_token: { file: ./infra/secrets/vault_token.txt }

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pg_data:
  vault_data:
